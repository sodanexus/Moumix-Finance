name: Daily patrimoine snapshot

on:
  schedule:
    - cron: '0 22 * * *'   # 22h UTC = minuit Paris (heure d'hiver) / 23h UTC = minuit Paris (heure d'été)
  workflow_dispatch:        # permet de lancer manuellement depuis GitHub

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run snapshot
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_KEY: ${{ secrets.SUPA_SERVICE_KEY }}
          USER_IDS: ${{ secrets.SNAPSHOT_USER_IDS }}
        run: node scripts/daily-snapshot.js
